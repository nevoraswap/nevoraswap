<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEVORA SWAP — подтверждение входа</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      user-select: none;
    }
    
    body {
      background: #0f0f23;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Canvas background */
    #canvas-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
    }
    
    .container {
      position: relative;
      z-index: 10;
      background: #1a1a2e;
      border: 2px solid #6366f1;
      border-radius: 28px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(4px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(99, 102, 241, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .container:hover {
      transform: translateY(-2px);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(99, 102, 241, 0.3);
    }
    
    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      letter-spacing: -0.5px;
    }
    
    .code {
      font-size: 2.8rem;
      letter-spacing: 12px;
      color: #818cf8;
      margin: 1.5rem 0;
      padding: 1rem;
      background: #0f0f23;
      border-radius: 20px;
      font-family: 'Courier New', 'SF Mono', monospace;
      font-weight: 700;
      border: 1px solid #6366f1;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.2);
    }
    
    .status {
      color: #94a3b8;
      margin: 1rem 0;
      font-size: 0.95rem;
    }
    
    .btn {
      background: transparent;
      border: 2px solid #6366f1;
      border-radius: 50px;
      padding: 0.8rem 2rem;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin: 0.5rem 0;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn:hover {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .login-form, .register-form {
      margin-top: 1.5rem;
      text-align: left;
    }
    
    input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      margin: 0.6rem 0;
      background: #0f0f23;
      border: 1px solid #2a2a3a;
      border-radius: 50px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    input:focus {
      border-color: #6366f1;
      outline: none;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    
    input::placeholder {
      color: #5a6a8a;
    }
    
    .error {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.3rem;
      text-align: center;
    }
    
    .tabs {
      display: flex;
      gap: 1rem;
      margin: 1rem 0 0.5rem;
    }
    
    .tab {
      flex: 1;
      padding: 0.6rem;
      background: transparent;
      border: 2px solid #2a2a3a;
      border-radius: 50px;
      color: #94a3b8;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    
    .tab.active {
      border-color: #6366f1;
      color: #818cf8;
      background: rgba(99, 102, 241, 0.1);
    }
    
    .tab:hover {
      border-color: #6366f1;
      color: #a78bfa;
    }
    
    .success-icon {
      font-size: 3.5rem;
      margin: 1rem 0;
      animation: pulse 0.5s ease;
    }
    
    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    .success-title {
      color: #22c55e;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    
    .close-hint {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg"></canvas>
  
  <div class="container">
    <div class="logo">NEVORA SWAP</div>
    
    <div id="codeDisplay" class="code">------</div>
    <div id="status" class="status">Загрузка...</div>

    <div id="authSection" style="display: none;">
      <div class="tabs">
        <button class="tab active" id="loginTab" onclick="switchTab('login')">Вход</button>
        <button class="tab" id="registerTab" onclick="switchTab('register')">Регистрация</button>
      </div>

      <div id="loginForm" class="login-form">
        <input type="text" id="loginUsername" placeholder="Логин (3-15 символов)" autocomplete="off">
        <input type="password" id="loginPassword" placeholder="Пароль" autocomplete="off">
        <div id="loginError" class="error"></div>
        <button class="btn" onclick="handleLogin()">Войти и подтвердить</button>
      </div>

      <div id="registerForm" class="register-form" style="display: none;">
        <input type="text" id="regUsername" placeholder="Логин (3-15 символов)" autocomplete="off">
        <input type="password" id="regPassword" placeholder="Пароль" autocomplete="off">
        <div id="registerError" class="error"></div>
        <button class="btn" onclick="handleRegister()">Зарегистрироваться и подтвердить</button>
      </div>
    </div>

    <div id="successSection" style="display: none;">
      <div class="success-icon">✅</div>
      <div class="success-title">Успешно!</div>
      <p class="status">Можете закрыть это окно</p>
      <div class="close-hint">окно закроется автоматически...</div>
    </div>
  </div>

  <script>
    // Canvas background animation
    (function() {
      const canvas = document.getElementById('canvas-bg');
      const ctx = canvas.getContext('2d');
      let width, height, particles = [];
      let mouseX = 0, mouseY = 0;
      
      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        createParticles();
      }
      
      function createParticles() {
        particles = [];
        const count = Math.min(100, Math.floor(width * height / 15000));
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            baseX: Math.random() * width,
            baseY: Math.random() * height,
            size: Math.random() * 2.5 + 1,
            speed: 0.008 + Math.random() * 0.015,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3
          });
        }
      }
      
      function updateParticles() {
        particles.forEach(p => {
          let dxBase = p.baseX - p.x;
          let dyBase = p.baseY - p.y;
          p.x += dxBase * p.speed + p.vx;
          p.y += dyBase * p.speed + p.vy;
          
          let dx = p.x - mouseX;
          let dy = p.y - mouseY;
          let dist = Math.hypot(dx, dy);
          if (dist < 120) {
            let force = (120 - dist) / 120 * 1.5;
            let angle = Math.atan2(dy, dx);
            p.x += Math.cos(angle) * force;
            p.y += Math.sin(angle) * force;
          }
          
          p.x = Math.min(width + 30, Math.max(-30, p.x));
          p.y = Math.min(height + 30, Math.max(-30, p.y));
        });
      }
      
      function draw() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = '#6366f1';
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#6366f1';
          ctx.fill();
        });
        ctx.shadowBlur = 0;
      }
      
      function animate() {
        updateParticles();
        draw();
        requestAnimationFrame(animate);
      }
      
      window.addEventListener('resize', () => {
        resizeCanvas();
      });
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
      resizeCanvas();
      animate();
    })();

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCbgkMW0F0Nb8THjhoCapueR0ccGTexoyk",
      databaseURL: "https://swap-3f785-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Получаем код из URL
    const urlParams = new URLSearchParams(window.location.search);
    const authCode = urlParams.get('code');

    let currentUser = null;
    let currentTab = 'login';

    // Показываем код
    if (authCode) {
      document.getElementById('codeDisplay').innerText = authCode;
      document.getElementById('status').innerText = 'Войдите в аккаунт для подтверждения';
      document.getElementById('authSection').style.display = 'block';
      
      // Проверяем, не авторизован ли уже этот код
      const codeRef = db.ref('auth_codes/' + authCode);
      codeRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.username) {
          // Код уже активирован
          showSuccess();
        }
      });
    } else {
      document.getElementById('status').innerText = 'Ошибка: код не найден';
    }

    function switchTab(tab) {
      currentTab = tab;
      if (tab === 'login') {
        document.getElementById('loginTab').classList.add('active');
        document.getElementById('registerTab').classList.remove('active');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.getElementById('registerTab').classList.add('active');
        document.getElementById('loginTab').classList.remove('active');
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginForm').style.display = 'none';
      }
    }

    function hashPassword(password) {
      return CryptoJS.SHA256(password).toString();
    }

    function validateUsername(username) {
      if (!username) return 'Введите логин';
      if (username.length < 3) return 'Логин должен быть от 3 символов';
      if (username.length > 15) return 'Логин должен быть до 15 символов';
      if (!/^[a-z0-9]+$/i.test(username)) return 'Логин может содержать только английские буквы и цифры';
      return null;
    }

    function validatePassword(password) {
      if (!password) return 'Введите пароль';
      if (password.length < 3) return 'Пароль должен быть минимум 3 символа';
      return null;
    }

    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      const usernameError = validateUsername(username);
      if (usernameError) {
        document.getElementById('loginError').innerText = usernameError;
        return;
      }

      const passwordError = validatePassword(password);
      if (passwordError) {
        document.getElementById('loginError').innerText = passwordError;
        return;
      }

      document.getElementById('loginError').innerText = 'Проверка...';
      document.getElementById('loginError').style.color = '#818cf8';

      try {
        const snapshot = await db.ref('users/' + username).once('value');
        const user = snapshot.val();

        if (!user) {
          document.getElementById('loginError').innerText = 'Пользователь не найден';
          document.getElementById('loginError').style.color = '#ef4444';
          return;
        }

        if (user.password !== hashPassword(password)) {
          document.getElementById('loginError').innerText = 'Неверный пароль';
          document.getElementById('loginError').style.color = '#ef4444';
          return;
        }

        // Успешный вход - сохраняем код
        await db.ref('auth_codes/' + authCode).set({
          username: username,
          timestamp: Date.now()
        });

        showSuccess();
      } catch (error) {
        document.getElementById('loginError').innerText = 'Ошибка: ' + error.message;
        document.getElementById('loginError').style.color = '#ef4444';
      }
    }

    async function handleRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value.trim();

      const usernameError = validateUsername(username);
      if (usernameError) {
        document.getElementById('registerError').innerText = usernameError;
        return;
      }

      const passwordError = validatePassword(password);
      if (passwordError) {
        document.getElementById('registerError').innerText = passwordError;
        return;
      }

      document.getElementById('registerError').innerText = 'Регистрация...';
      document.getElementById('registerError').style.color = '#818cf8';

      try {
        // Проверяем, существует ли пользователь
        const exists = await db.ref('users/' + username).once('value').then(s => s.exists());
        if (exists) {
          document.getElementById('registerError').innerText = 'Пользователь уже существует';
          document.getElementById('registerError').style.color = '#ef4444';
          return;
        }

        // Создаем пользователя
        const user = {
          password: hashPassword(password),
          created_at: new Date().toISOString()
        };
        await db.ref('users/' + username).set(user);

        // Сохраняем код
        await db.ref('auth_codes/' + authCode).set({
          username: username,
          timestamp: Date.now()
        });

        showSuccess();
      } catch (error) {
        document.getElementById('registerError').innerText = 'Ошибка: ' + error.message;
        document.getElementById('registerError').style.color = '#ef4444';
      }
    }

    function showSuccess() {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('successSection').style.display = 'block';
      document.getElementById('status').style.display = 'none';
      
      // Автоматически закрыть окно через 2 секунды
      setTimeout(() => {
        window.close();
      }, 2000);
    }
  </script>
</body>
</html>
